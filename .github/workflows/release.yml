name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ── 计算版本号 + 生成 Release ────────────────────────────────
  semantic-release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.release.outputs.version }}
      new_release: ${{ steps.release.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release exec plugin
        run: npm install -g @semantic-release/exec

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 22
          extra_plugins: |
            conventional-changelog-conventionalcommits@7
            @semantic-release/exec
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 构建 & 推送 Docker 镜像 ────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # Get the latest after semantic-release commit

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: zl3n22/stock_datasource
          tags: |
            type=raw,value=backend-latest
            type=raw,value=backend-${{ needs.semantic-release.outputs.new_version }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ needs.semantic-release.outputs.new_version }}

      - name: Docker metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: zl3n22/stock_datasource
          tags: |
            type=raw,value=frontend-latest
            type=raw,value=frontend-${{ needs.semantic-release.outputs.new_version }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: docker/Dockerfile.frontend
          target: production
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ needs.semantic-release.outputs.new_version }}

      - name: Summary
        run: |
          echo "### 🚀 Release v${{ needs.semantic-release.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`backend-${{ needs.semantic-release.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`frontend-${{ needs.semantic-release.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
